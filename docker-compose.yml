version: '3.9'

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.2
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=redpanda:8082
      - --schema-registry-addr=0.0.0.0:8081
    ports:
      - "19092:19092"
      - "9644:9644"
      - "8081:8081"
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.8.0
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  scan-gateway:
    build:
      context: .
      dockerfile: services/scan-gateway/Dockerfile
    environment:
      KAFKA_BOOTSTRAP: redpanda:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      SCAN_TOPIC: factory.scan.received
    ports:
      - "8000:8000"
    depends_on:
      redpanda:
        condition: service_healthy
      jaeger:
        condition: service_started

  workflow-orchestration-service:
    build:
      context: .
      dockerfile: services/workflow-orchestration-service/Dockerfile
    environment:
      KAFKA_BOOTSTRAP: redpanda:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      SCAN_TOPIC: factory.scan.received
      VALIDATION_TOPIC: factory.validation.requested
      WORKFLOW_LIFECYCLE_TOPIC: factory.workflow.lifecycle
    depends_on:
      redpanda:
        condition: service_healthy
      jaeger:
        condition: service_started

  validator-service:
    build:
      context: .
      dockerfile: services/validator-service/Dockerfile
    environment:
      KAFKA_BOOTSTRAP: redpanda:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      VALIDATION_TOPIC: factory.validation.requested
      SUCCESS_TOPIC: factory.errorproof.completed
      ERROR_TOPIC: factory.errorproof.error
    depends_on:
      redpanda:
        condition: service_healthy
      jaeger:
        condition: service_started
